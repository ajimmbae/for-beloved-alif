<!DOCTYPE html>
<html>
<head>
<title>for you</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:sans-serif;
  background:#ffe6eb;
  overflow:hidden;
  text-align:center;
}

/* envelope + paper */
#envelope{
  font-size:70px;
  cursor:pointer;
  animation:shake 2s infinite;
}

@keyframes shake{
  0%{transform:rotate(0);}
  25%{transform:rotate(2deg);}
  50%{transform:rotate(-2deg);}
  75%{transform:rotate(2deg);}
  100%{transform:rotate(0);}
}

#paper, #page2{
  display:none;
  width:85%;
  max-width:420px;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  position:relative;
}

/* hearts */
.heart{
  position:absolute;
  color:pink;
  animation:fall 4s linear infinite;
  pointer-events:none;
}

@keyframes fall{
  0%{transform:translateY(-10vh);opacity:1;}
  100%{transform:translateY(110vh);opacity:0;}
}

/* Ronaldo jump scare */
#ronaldo{
  position:fixed;
  top:-200px;
  left:50%;
  transform:translateX(-50%);
  width:180px;
  transition:0.5s;
  z-index:999;
}

/* football buttons */
.ballBtn{
  border-radius:50%;
  width:90px;
  height:90px;
  border:none;
  margin:10px;
  cursor:pointer;
  font-weight:bold;
}

/* shake effect */
.shake{
  animation:shake2 0.3s infinite;
}

@keyframes shake2{
  0%{transform:translateX(0);}
  50%{transform:translateX(5px);}
  100%{transform:translateX(-5px);}
}
</style>
</head>
