<!DOCTYPE html>
<html>
<head>
<title>for you</title>
<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ffe6eb;
  font-family:sans-serif;
  overflow:hidden;
}

/* envelope */
#envelope{
  font-size:80px;
  cursor:pointer;
  animation:shake 2s infinite;
  text-align:center;
}

@keyframes shake{
  0%{transform:rotate(0deg);}
  25%{transform:rotate(2deg);}
  50%{transform:rotate(-2deg);}
  75%{transform:rotate(2deg);}
  100%{transform:rotate(0deg);}
}

/* paper */
#paper{
  display:none;
  position:absolute;
  width:80%;
  max-width:400px;
  background:white;
  padding:20px;
  border-radius:10px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  animation:pop 0.8s forwards;
}

@keyframes pop{
  from{transform:scale(0.3);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

img{
  width:120px;
  margin:10px;
}
</style>
</head>

<body>

<div id="envelope" onclick="openLetter()">
📩<br>
<button>open</button>
</div>

<div id="paper">
  <img src="https://media.giphy.com/media/l0HlQ7LRalQqdWfao/giphy.gif">
  <img src="https://media.giphy.com/media/MDJ9IbxxvDUQM/giphy.gif">

  <h3 id="text"></h3>
</div>

<script>
function openLetter(){
  document.getElementById("envelope").style.display="none";
  document.getElementById("paper").style.display="block";
  typeWriter();
}

let msg = ` for my baby , Aliff 
hi sayanggggg , bf u ni :3 !
i belajar coding tauu untuk baby hehehe .
bukan senangg tauu :< .
okayylahh tu jee , i just nak you tau yang link ni ajim you yang buatt mwhahah !
sorry okayy kalau tak lawa macam orang lainn .
i baru belajar hehee .
okaylahh pape tekan bawah .
byeeee`;

let i=0;
function typeWriter(){
  let text = document.getElementById("text");
  let speed = 40;

  function typing(){
    if(i < msg.length){
      text.innerHTML += msg.charAt(i);
      i++;
      setTimeout(typing, speed);
    }
  }
  typing();
}
</script>

</body>
</html>
