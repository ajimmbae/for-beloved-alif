<!DOCTYPE html>
<html>
<head>
<title>for you</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:sans-serif;
  background:#ffe6eb;
  overflow:hidden;
  text-align:center;
}

/* ENVELOPE */
#envelope{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  user-select:none;
}

#envelope span{
  font-size:80px;
}

/* PAPER + PAGE2 */
#paper, #page2{
  display:none;
  width:85%;
  max-width:420px;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* BUTTON */
button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:pink;
  cursor:pointer;
  margin-top:10px;
}

.ballBtn{
  width:90px;
  height:90px;
  border-radius:50%;
}

/* HEARTS */
.heart{
  position:absolute;
  color:pink;
  animation:fall 4s linear infinite;
  pointer-events:none;
}

@keyframes fall{
  0%{transform:translateY(-10vh);opacity:1;}
  100%{transform:translateY(110vh);opacity:0;}
}

/* RONALDO */
#ronaldo{
  position:fixed;
  left:-200px;
  top:25%;
  width:180px;
  transition:0.3s;
  z-index:999;
}

#ball{
  position:fixed;
  left:-100px;
  top:45%;
  width:80px;
  z-index:998;
  transition:0.4s;
}

/* SHAKE */
.shake{
  animation:shake 0.15s infinite;
}

@keyframes shake{
  0%{transform:translate(0,0);}
  25%{transform:translate(3px,-3px);}
  50%{transform:translate(-3px,3px);}
  75%{transform:translate(3px,3px);}
  100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div id="envelope" onclick="openLetter()">
  <span>📩</span>
  <p>tap anywhere</p>
</div>

<!-- STEP 1 -->
<div id="paper">
  <h3>For my baby . Alif Rayyan ~ 💗</h3>

  <h3 id="text"></h3>

  <button onclick="goPage2()">continue</button>
</div>

<!-- RONALDO + BALL -->
<img id="ronaldo" src="https://media.tenor.com/jH0V4V6y9fQAAAAC/ronaldo-siu.gif">
<img id="ball" src="https://media.tenor.com/3Q1VxZy0Z2QAAAAC/football-ball.gif">

<!-- AUDIO (optional) -->
<audio id="sui">
  <source src="https://www.myinstants.com/media/sounds/siiuuu.mp3" type="audio/mpeg">
</audio>

<!-- STEP 2 -->
<div id="page2">
  <h2 id="msg2"></h2>

  <button class="ballBtn" onclick="accept()">ACCEPT ⚽</button>
  <button class="ballBtn" id="ignoreBtn" onmouseover="runAway()">IGNORE ⚽</button>
</div>

<script>

let i=0;

let msg=`hi sayanggggg , bf u ni :3 !
i belajar coding tauu untuk baby hehehe .
bukan senangg tauu :< .
okayylahh tu jee , i just nak you tau yang link ni ajim you yang buatt mwhahah !
sorry okayy kalau tak lawa macam orang lainn .
i baru belajar hehee .
okaylahh pape tekan bawah .
byeeee`;

function openLetter(){
  document.getElementById("envelope").style.display="none";
  document.getElementById("paper").style.display="block";
  typeWriter();
  setInterval(createHeart,200);
}

function typeWriter(){
  let text=document.getElementById("text");

  function typing(){
    if(i<msg.length){
      text.innerHTML+=msg.charAt(i);
      i++;
      setTimeout(typing,35);
    }
  }
  typing();
}

function goPage2(){
  document.getElementById("paper").style.display="none";
  document.getElementById("page2").style.display="block";

  let r=document.getElementById("ronaldo");
  let b=document.getElementById("ball");
  let s=document.getElementById("sui");

  r.style.left="-200px";
  b.style.left="-100px";

  setTimeout(()=>{
    r.style.left="30%";
  },200);

  setTimeout(()=>{
    b.style.left="120%";
    document.body.classList.add("shake");
    s.play();
  },700);

  setTimeout(()=>{
    document.body.classList.remove("shake");
  },1200);

  document.getElementById("msg2").innerHTML=
  "i minta maaf sayang 😭<br><br>you maafkan i tak?";
}

function accept(){
  document.getElementById("page2").innerHTML=`
    <h1>thank you ❤️</h1>
    <p>i promise i’ll be better for you</p>
  `;
}

function runAway(){
  let btn=document.getElementById("ignoreBtn");

  btn.style.position="absolute";
  btn.style.left=Math.random()*80+"vw";
  btn.style.top=Math.random()*60+"vh";
  let r=document.getElementById("ronaldo");
  r.src="https://media.tenor.com/yLZ5G0Vq2cUAAAAC/ronaldo-cry.gif";

  document.getElementById("msg2").innerHTML=
  "ronaldo sedih 😭 pls jangan ignore...";

  document.body.classList.add("shake");

  setTimeout(()=>{
    document.body.classList.remove("shake");
  },800);
}

/* hearts */
function createHeart(){
  let h=document.createElement("div");
  h.classList.add("heart");
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=(10+Math.random()*20)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
}

</script>

</body>
</html>
