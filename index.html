<!DOCTYPE html>
<html>
<head>
<title>for you</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#ffe6eb;
  font-family:sans-serif;
  overflow:hidden;
}

/* envelope */
#envelope{
  font-size:70px;
  cursor:pointer;
  text-align:center;
  animation:shake 2s infinite;
}

@keyframes shake{
  0%{transform:rotate(0);}
  25%{transform:rotate(2deg);}
  50%{transform:rotate(-2deg);}
  75%{transform:rotate(2deg);}
  100%{transform:rotate(0);}
}

/* paper */
#paper{
  display:none;
  position:absolute;
  width:85%;
  max-width:420px;
  background:white;
  padding:20px;
  border-radius:15px;
  text-align:center;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  animation:pop 0.8s ease;
  z-index:2;
}

@keyframes pop{
  from{transform:scale(0.3);opacity:0;}
  to{transform:scale(1);opacity:1;}
}

h3{
  margin-bottom:10px;
}

/* hearts */
.heart{
  position:absolute;
  color:pink;
  font-size:18px;
  animation:fall 4s linear infinite;
  pointer-events:none;
}

@keyframes fall{
  0%{transform:translateY(-10vh);opacity:1;}
  100%{transform:translateY(110vh);opacity:0;}
}

img{
  width:110px;
  margin:5px;
}
</style>
</head>

<body>

<div id="envelope" onclick="openLetter()">
📩<br>
<button>open</button>
</div>

<div id="paper">
  <h3>For my baby . Alif Rayyan ~ 💗</h3>

  <img src="https://media.giphy.com/media/l0HlQ7LRalQqdWfao/giphy.gif">

  <h3 id="text"></h3>
</div>

<script>
function openLetter(){
  document.getElementById("envelope").style.display="none";
  document.getElementById("paper").style.display="block";
  typeWriter();
  setInterval(createHeart,200);
}

/* typing text */
let msg = `hi sayanggggg , bf u ni :3 !
i belajar coding tauu untuk baby hehehe .
bukan senangg tauu :< .
okayylahh tu jee , i just nak you tau yang link ni ajim you yang buatt mwhahah !
sorry okayy kalau tak lawa macam orang lainn .
i baru belajar hehee .
okaylahh pape tekan bawah .
byeeee`;

let i=0;
function typeWriter(){
  let text=document.getElementById("text");
  let speed=40;

  function typing(){
    if(i<msg.length){
      text.innerHTML+=msg.charAt(i);
      i++;
      setTimeout(typing,speed);
    }
  }
  typing();
}

/* heart rain */
function createHeart(){
  const heart=document.createElement("div");
  heart.classList.add("heart");
  heart.innerHTML="❤";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(10+Math.random()*20)+"px";
  document.body.appendChild(heart);

  setTimeout(()=>heart.remove(),4000);
}
</script>

</body>
</html>
