<!DOCTYPE html>
<html>
<head>
<title>for you</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  font-family:sans-serif;
  background:#ffe6eb;
  overflow:hidden;
  text-align:center;
}

/* FULL CLICK ENVELOPE */
#envelope{
  position:fixed;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
  cursor:pointer;
  user-select:none;
  background:#ffe6eb;
}

#envelope span{
  font-size:80px;
}

/* PAPER */
#paper, #page2{
  display:none;
  width:85%;
  max-width:420px;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  position:relative;
}

/* HEARTS */
.heart{
  position:absolute;
  color:pink;
  animation:fall 4s linear infinite;
  pointer-events:none;
}

@keyframes fall{
  0%{transform:translateY(-10vh);opacity:1;}
  100%{transform:translateY(110vh);opacity:0;}
}

/* BUTTONS */
button{
  padding:12px 20px;
  border:none;
  border-radius:20px;
  background:pink;
  cursor:pointer;
  margin-top:10px;
}

.ballBtn{
  width:90px;
  height:90px;
  border-radius:50%;
}

/* RONALDO */
#ronaldo{
  position:fixed;
  top:-200px;
  left:50%;
  transform:translateX(-50%);
  width:180px;
  z-index:999;
  transition:0.4s;
}
</style>
</head>

<body>

<!-- ENVELOPE (FULL SCREEN CLICK SAFE) -->
<div id="envelope" onclick="openLetter()">
  <span>📩</span>
  <p>tap anywhere</p>
</div>

<!-- STEP 1 -->
<div id="paper">
  <h3>For my baby . Alif Rayyan ~ 💗</h3>

  <img src="https://upload.wikimedia.org/wikipedia/commons/8/8c/Cristiano_Ronaldo_2018.jpg" width="140" style="border-radius:10px;">

  <h3 id="text"></h3>

  <button onclick="goPage2()">continue</button>
</div>

<!-- RONALDO -->
<img id="ronaldo"
src="https://media.tenor.com/jH0V4V6y9fQAAAAC/ronaldo-siu.gif">

<!-- STEP 2 -->
<div id="page2">
  <h2 id="msg2"></h2>

  <button class="ballBtn" onclick="accept()">ACCEPT ⚽</button>
  <button class="ballBtn" id="ignoreBtn" onmouseover="runAway()">IGNORE ⚽</button>
</div>

<script>

let i=0;

let msg=`hi sayanggggg , bf u ni :3 !
i belajar coding tauu untuk baby hehehe .
bukan senangg tauu :< .
okayylahh tu jee , i just nak you tau yang link ni ajim you yang buatt mwhahah !
sorry okayy kalau tak lawa macam orang lainn .
i baru belajar hehee .
okaylahh pape tekan bawah .
byeeee`;

function openLetter(){
  document.getElementById("envelope").style.display="none";
  document.getElementById("paper").style.display="block";
  typeWriter();
  setInterval(createHeart,200);
}

function typeWriter(){
  let text=document.getElementById("text");

  function typing(){
    if(i<msg.length){
      text.innerHTML+=msg.charAt(i);
      i++;
      setTimeout(typing,35);
    }
  }
  typing();
}

function goPage2(){
  document.getElementById("paper").style.display="none";
  document.getElementById("page2").style.display="block";

  let r=document.getElementById("ronaldo");
  r.style.top="20px";

  setTimeout(()=>r.style.top="-200px",1500);

  document.getElementById("msg2").innerHTML=
  "i minta maaf yee sayangg , i dah taknak buat dahh . i promise hati ke hati okayy :3 <br><br> you maafkan i tak ?";
}

function accept(){
  document.getElementById("page2").innerHTML=`
    <h1>thank you ❤️</h1>
    <p>i'll do better for you</p>
  `;
}

function runAway(){
  let btn=document.getElementById("ignoreBtn");

  btn.style.position="absolute";
  btn.style.left=Math.random()*70+"vw";
  btn.style.top=Math.random()*60+"vh";

  document.getElementById("ronaldo").src=
  "https://media.tenor.com/yLZ5G0Vq2cUAAAAC/ronaldo-cry.gif";

  document.getElementById("msg2").innerHTML=
  "ronaldo sedih 😭 pls tekan accept...";
}

/* hearts */
function createHeart(){
  let h=document.createElement("div");
  h.classList.add("heart");
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=(10+Math.random()*20)+"px";
  document.body.appendChild(h);

  setTimeout(()=>h.remove(),4000);
}

</script>

</body>
</html>
