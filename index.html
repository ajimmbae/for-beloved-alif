 <!DOCTYPE html>
<html>
<head>
<title>for you</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:sans-serif;
  background:#ffe6eb;
  overflow:hidden;
  text-align:center;
}

#envelope{
  position:fixed;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

#paper, #page2{
  display:none;
  width:85%;
  max-width:420px;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

/* GIF */
img{
  width:140px;
  margin:10px;
}

/* BUTTON */
button{
  padding:12px 18px;
  border:none;
  border-radius:20px;
  background:pink;
  cursor:pointer;
  margin:8px;
}

/* HEART */
.heart{
  position:absolute;
  color:pink;
  animation:fall 4s linear infinite;
  pointer-events:none;
}

@keyframes fall{
  0%{transform:translateY(-10vh);opacity:1;}
  100%{transform:translateY(110vh);opacity:0;}
}

/* RONALDO */
#ronaldo{
  position:fixed;
  top:20%;
  left:-200px;
  width:180px;
  transition:0.3s;
  z-index:999;
}

#ball{
  position:fixed;
  top:45%;
  left:-100px;
  width:80px;
  z-index:998;
  transition:0.4s;
}

/* SHAKE */
.shake{
  animation:shake 0.15s infinite;
}

@keyframes shake{
  0%{transform:translate(0,0);}
  25%{transform:translate(3px,-3px);}
  50%{transform:translate(-3px,3px);}
  75%{transform:translate(3px,3px);}
  100%{transform:translate(0,0);}
}
</style>
</head>

<body>

<!-- ENVELOPE -->
<div id="envelope" onclick="openLetter()">
  <span style="font-size:80px;">📩</span>
  <p>tap anywhere</p>
</div>

<!-- STEP 1 -->
<div id="paper">
  <h3>For my baby . Alif Rayyan ~ 💗</h3>

  <img src="https://media.tenor.com/l0HlQ7LRalQAAAAC/cute-bear.gif">

  <h3 id="text"></h3>

  <button onclick="goPage2()">continue</button>
</div>

<!-- RONALDO -->
<img id="ronaldo"
src="https://media.tenor.com/jH0V4V6y9fQAAAAC/ronaldo-siu.gif">

<img id="ball"
src="https://media.tenor.com/3Q1VxZy0Z2QAAAAC/football-ball.gif">

<!-- STEP 2 -->
<div id="page2">
  <h2 id="msg2"></h2>

  <button onclick="accept()">ACCEPT ⚽</button>
  <button id="ignoreBtn" onmouseover="runAway()">IGNORE ⚽</button>
</div>

<script>

let i=0;

let msg=`hi sayanggggg , bf u ni :3 !
i belajar coding tauu untuk baby hehehe .
bukan senangg tauu :< .
okayylahh tu jee , i just nak you tau yang link ni ajim you yang buatt mwhahah !
sorry okayy kalau tak lawa macam orang lainn .
i baru belajar hehee .
okaylahh pape tekan bawah .
byeeee`;

function openLetter(){
  document.getElementById("envelope").style.display="none";
  document.getElementById("paper").style.display="block";
  typeWriter();
  setInterval(createHeart,200);
}

function typeWriter(){
  let text=document.getElementById("text");

  function typing(){
    if(i<msg.length){
      text.innerHTML+=msg.charAt(i);
      i++;
      setTimeout(typing,35);
    }
  }
  typing();
}

function goPage2(){
  document.getElementById("paper").style.display="none";
  document.getElementById("page2").style.display="block";

  let r=document.getElementById("ronaldo");
  let b=document.getElementById("ball");

  r.style.left="30%";

  setTimeout(()=>{
    b.style.left="120%";
    document.body.classList.add("shake");
  },600);

  setTimeout(()=>{
    document.body.classList.remove("shake");
  },1200);

  document.getElementById("msg2").innerHTML=
  "i minta maaf sayang 😭<br><br>you maafkan i tak?";
}

function accept(){
  document.getElementById("page2").innerHTML=`
    <h1>thank you ❤️</h1>
    <p>i promise i’ll do better</p>
  `;
}

function runAway(){
  let btn=document.getElementById("ignoreBtn");

  btn.style.position="absolute";
  btn.style.left=Math.random()*80+"vw";
  btn.style.top=Math.random()*60+"vh";

  let r=document.getElementById("ronaldo");
  r.src="https://media.tenor.com/yLZ5G0Vq2cUAAAAC/ronaldo-cry.gif";

  document.getElementById("msg2").innerHTML=
  "ronaldo sedih 😭 pls jangan ignore...";
}

/* HEARTS */
function createHeart(){
  let h=document.createElement("div");
  h.classList.add("heart");
  h.innerHTML="❤";
  h.style.left=Math.random()*100+"vw";
  h.style.fontSize=(10+Math.random()*20)+"px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),4000);
}

</script>

</body>
</html>
